<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LensCraft Studio</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

/* Brand Title */
h1{
    margin:25px 0;
    font-size:40px;
    letter-spacing:2px;
}

/* Category Title */
h2{
    margin-top:40px;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    width:80%;
    margin:20px auto;
}

.gallery img{
    width:100%;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    z-index:1000;
    padding-top:60px;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.lightbox img{
    margin:auto;
    display:block;
    max-width:80%;
    max-height:80%;
}

/* Close Button */
.close{
    position:absolute;
    top:20px;
    right:35px;
    font-size:40px;
    cursor:pointer;
}

/* Navigation */
.prev, .next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:40px;
    cursor:pointer;
    padding:10px;
}

.prev{ left:30px; }
.next{ right:30px; }

</style>
</head>

<body>

<h1>LensCraft Studio</h1>

<!-- Nature Category -->
<h2>🌿 Nature Photography</h2>
<div class="gallery">
<img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(0)">
<img src="https://picsum.photos/id/1016/600/400" onclick="openLightbox(1)">
<img src="https://picsum.photos/id/1018/600/400" onclick="openLightbox(2)">
</div>

<!-- Portrait Category -->
<h2>👤 Portrait Photography</h2>
<div class="gallery">
<img src="https://picsum.photos/id/1020/600/400" onclick="openLightbox(3)">
<img src="https://picsum.photos/id/1024/600/400" onclick="openLightbox(4)">
<img src="https://picsum.photos/id/1027/600/400" onclick="openLightbox(5)">
</div>

<!-- Travel Category -->
<h2>✈️ Travel Photography</h2>
<div class="gallery">
<img src="https://picsum.photos/id/1035/600/400" onclick="openLightbox(6)">
<img src="https://picsum.photos/id/1038/600/400" onclick="openLightbox(7)">
<img src="https://picsum.photos/id/1043/600/400" onclick="openLightbox(8)">
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
<span class="close" onclick="closeLightbox()">&times;</span>
<span class="prev" onclick="changeImage(-1)">&#10094;</span>
<img id="lightbox-img">
<span class="next" onclick="changeImage(1)">&#10095;</span>
</div>

<script>

const images = [
"https://picsum.photos/id/1015/600/400",
"https://picsum.photos/id/1016/600/400",
"https://picsum.photos/id/1018/600/400",
"https://picsum.photos/id/1020/600/400",
"https://picsum.photos/id/1024/600/400",
"https://picsum.photos/id/1027/600/400",
"https://picsum.photos/id/1035/600/400",
"https://picsum.photos/id/1038/600/400",
"https://picsum.photos/id/1043/600/400"
];

let currentIndex = 0;

function openLightbox(index){
currentIndex = index;
document.getElementById("lightbox").style.display="block";
document.getElementById("lightbox-img").src = images[index];
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

function changeImage(step){
currentIndex += step;

if(currentIndex < 0) currentIndex = images.length - 1;
if(currentIndex >= images.length) currentIndex = 0;

document.getElementById("lightbox-img").src = images[currentIndex];
}

</script>

</body>
</html>
