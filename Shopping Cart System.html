<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Cart Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --success: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            width: 95%;
            max-width: 1000px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Control Panel */
        .controls {
            border-right: 1px solid #334155;
            padding-right: 25px;
        }

        h2 { color: var(--primary); font-size: 1.4rem; margin-top: 0; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #94a3b8; }
        
        input {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-front { background: var(--primary); color: white; }
        .btn-end { background: var(--secondary); color: white; }
        .btn-del { background: #ef4444; color: white; margin-top: 20px; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Cart Feed */
        .cart-feed {
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }

        .item-card {
            background: #334155;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .total-display {
            background: var(--success);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="controls">
        <h2>📦 Product Entry</h2>
        
        <div class="input-group">
            <label>Product ID</label>
            <input type="number" id="id" placeholder="101">
        </div>
        <div class="input-group">
            <label>Item Name</label>
            <input type="text" id="name" placeholder="Wireless Mouse">
        </div>
        <div class="input-group">
            <label>Price (₹)</label>
            <input type="number" id="price" placeholder="599">
        </div>
        <div class="input-group">
            <label>Quantity</label>
            <input type="number" id="qty" placeholder="1">
        </div>

        <div class="btn-stack">
            <button class="btn-front" onclick="addItem('front')">Add to Top (Unshift)</button>
            <button class="btn-end" onclick="addItem('end')">Add to Bottom (Push)</button>
        </div>

        <hr style="border: 0.5px solid #334155; margin: 25px 0;">
        
        <div class="input-group">
            <label>Target ID to Remove</label>
            <input type="number" id="delId" placeholder="ID #">
        </div>
        <button class="btn-del" onclick="deleteItem()">Delete Item</button>
    </div>

    <div>
        <h2>🛒 Live Cart</h2>
        <div id="cartFeed" class="cart-feed">
            </div>
        <div class="total-display" id="grandTotal">
            Grand Total: ₹ 0
        </div>
    </div>
</div>

<script>
    let cart = [];

    function addItem(position) {
        const id = document.getElementById('id').value;
        const name = document.getElementById('name').value;
        const price = parseFloat(document.getElementById('price').value);
        const qty = parseInt(document.getElementById('qty').value);

        if(!id || !name || isNaN(price)) {
            alert("Please fill out all product details!");
            return;
        }

        const newItem = { id, name, price, qty };

        // Logic for "Working" existing items
        let existing = cart.find(item => item.id === id);
        if(existing) {
            existing.qty += qty;
        } else {
            if(position === 'front') {
                cart.unshift(newItem); // Pushes to index 0
            } else {
                cart.push(newItem);    // Pushes to end
            }
        }

        renderCart();
        clearInputs();
    }

    function deleteItem() {
        const targetId = document.getElementById('delId').value;
        const index = cart.findIndex(item => item.id === targetId);

        if(index === -1) {
            alert("Item ID not found!");
            return;
        }

        cart.splice(index, 1); // Removes item and shifts array
        renderCart();
    }

    function renderCart() {
        const feed = document.getElementById('cartFeed');
        const totalEl = document.getElementById('grandTotal');
        feed.innerHTML = "";
        
        let totalSum = 0;

        if(cart.length === 0) {
            feed.innerHTML = "<p style='text-align:center; opacity:0.4; margin-top:50px;'>Cart is currently empty.</p>";
        }

        cart.forEach(item => {
            const subtotal = item.price * item.qty;
            totalSum += subtotal;

            feed.innerHTML += `
                <div class="item-card">
                    <div>
                        <span style="font-size:0.7rem; color:var(--primary)">#${item.id}</span>
                        <div style="font-weight:bold; font-size:1.1rem;">${item.name}</div>
                        <div style="font-size:0.8rem; opacity:0.7;">₹${item.price} x ${item.qty}</div>
                    </div>
                    <div style="font-weight:bold; color:var(--success)">
                        ₹ ${subtotal}
                    </div>
                </div>
            `;
        });

        totalEl.innerText = `Grand Total: ₹ ${totalSum.toLocaleString()}`;
    }

    function clearInputs() {
        document.getElementById('id').value = '';
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        document.getElementById('qty').value = '';
    }

    // Initialize
    renderCart();
</script>

</body>
</html>
