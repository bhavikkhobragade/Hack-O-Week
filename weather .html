<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Weather Panel</title>

  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    :root {
      --bg-light: linear-gradient(to right, #74ebd5, #9face6);
      --bg-dark: linear-gradient(to right, #141e30, #243b55);
      --text-light: #fff;
      --text-dark: #222;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-light);
      transition: 0.4s;
    }

    body.dark {
      background: var(--bg-dark);
    }

    h1 {
      color: white;
      margin-bottom: 10px;
    }

    .controls {
      margin-bottom: 15px;
    }

    button {
      margin: 5px;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      width: 200px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease forwards;
    }

    body.dark .card {
      background: rgba(0, 0, 0, 0.3);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .icon {
      width: 40px;
      height: 40px;
      margin: 10px auto;
    }

    .temp {
      font-size: 26px;
      margin: 5px 0;
    }

    .hourly {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .hour {
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Weather Panel</h1>

<div class="controls">
  <button onclick="toggleTemp()">°C / °F</button>
  <button onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<div class="container" id="weatherContainer"></div>

<script>
let isCelsius = true;

const weatherData = [
  {
    city: "Pune",
    tempC: 28,
    condition: "Sunny",
    icon: "sun",
    hourly: [28, 30, 29]
  },
  {
    city: "Mumbai",
    tempC: 30,
    condition: "Humid",
    icon: "cloud-rain",
    hourly: [30, 31, 30]
  },
  {
    city: "Delhi",
    tempC: 26,
    condition: "Cloudy",
    icon: "cloud",
    hourly: [26, 27, 25]
  }
];

function convertTemp(temp) {
  return isCelsius
    ? `${temp}°C`
    : `${Math.round((temp * 9/5) + 32)}°F`;
}

function renderWeather() {
  const container = document.getElementById("weatherContainer");
  container.innerHTML = "";

  weatherData.forEach(data => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${data.city}</h3>
      <i data-feather="${data.icon}" class="icon"></i>
      <div class="temp">${convertTemp(data.tempC)}</div>
      <div>${data.condition}</div>

      <div class="hourly">
        ${data.hourly.map((t, i) => `
          <div class="hour">
            ${i*3}h<br>${convertTemp(t)}
          </div>
        `).join("")}
      </div>
    `;

    container.appendChild(card);
  });

  feather.replace();
}

function toggleTemp() {
  isCelsius = !isCelsius;
  renderWeather();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

renderWeather();
</script>

</body>
</html>
